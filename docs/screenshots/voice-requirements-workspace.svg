<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Create Req Chat voice-first workspace</title>
  <desc id="desc">A preview of Create Req Chat with one compact full-width header, a minimal voice prompt on the left, and a formatted requirements document on the right.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfdff"/>
      <stop offset="1" stop-color="#edf6f8"/>
    </linearGradient>
    <linearGradient id="leftPane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#edf5ff"/>
      <stop offset="1" stop-color="#eef9f6"/>
    </linearGradient>
    <linearGradient id="button" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#314253"/>
      <stop offset="1" stop-color="#4d6478"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#314253" flood-opacity="0.13"/>
    </filter>
    <style>
      .title { font: 800 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2f4052; }
      .copy { font: 500 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #506375; }
      .label { font: 750 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #748394; }
      .small { font: 500 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #506375; }
      .question-kicker { font: 850 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 1px; fill: #13a087; }
      .question { font: 850 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334557; }
      .button-text { font: 900 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .doc-title { font: 850 25px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2f4052; }
      .section-title { font: 800 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #7c8b9a; }
      .pending { font: 500 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #9aa8b5; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#page)"/>
  <path d="M0 0h1280v720H0z" fill="none" stroke="#dbe6ef" stroke-width="1" stroke-dasharray="42 42" opacity="0.35"/>

  <rect x="16" y="16" width="1248" height="688" rx="12" fill="#ffffff" stroke="#dbe6ef" filter="url(#shadow)"/>

  <rect x="17" y="17" width="1246" height="49" rx="12" fill="#ffffff"/>
  <text x="33" y="47" class="title">Create Req Chat</text>
  <text x="169" y="47" class="copy">Talk your way into a good requirement spec through just a conversation.</text>
  <rect x="881" y="26" width="66" height="31" rx="8" fill="#ffffff" stroke="#dbe6ef"/>
  <text x="891" y="46" class="label" fill="#314253">Restart</text>
  <rect x="956" y="26" width="115" height="31" rx="8" fill="#ffffff" stroke="#dbe6ef"/>
  <text x="967" y="46" class="label" fill="#314253">Copy transcript</text>
  <rect x="1081" y="26" width="76" height="31" rx="8" fill="#ffffff" stroke="#dbe6ef"/>
  <text x="1092" y="46" class="label" fill="#314253">Copy MD</text>
  <rect x="1167" y="26" width="80" height="31" rx="8" fill="#edf4ff" stroke="#c9dcff"/>
  <text x="1177" y="46" class="label" fill="#2855a5">Download</text>

  <line x1="17" y1="66" x2="1263" y2="66" stroke="#dbe6ef"/>
  <line x1="553" y1="66" x2="553" y2="704" stroke="#dbe6ef"/>

  <rect x="17" y="66" width="536" height="582" fill="url(#leftPane)"/>
  <rect x="41" y="224" width="487" height="112" rx="8" fill="#ffffff" stroke="#c9d8e6"/>
  <text x="161" y="246" class="question-kicker">QUESTION 1 OF 20 · PRODUCT SHAPE</text>
  <text x="78" y="275" class="question">What is the working name of the product or feature?</text>
  <text x="71" y="303" class="small">Good answer: Share the name, whether this is a product or feature, and any</text>
  <text x="164" y="320" class="small">customer-facing language you already like.</text>
  <circle cx="284" cy="399" r="56" fill="url(#button)"/>
  <text x="262" y="405" class="button-text">Start</text>
  <text x="177" y="480" class="small">Speak. The spec updates on the right.</text>
  <rect x="17" y="648" width="536" height="55" fill="#f8fbfd"/>
  <text x="39" y="671" class="label">Question 1 of 20</text>
  <text x="450" y="671" class="label">0% complete</text>
  <rect x="39" y="682" width="491" height="8" rx="4" fill="#e5edf5"/>

  <rect x="553" y="66" width="710" height="68" fill="#ffffff"/>
  <text x="569" y="94" class="title" style="font-size:22px">Requirements.md</text>
  <text x="569" y="118" class="copy">Formatted document updates from spoken answers.</text>
  <rect x="553" y="134" width="710" height="55" fill="#f8fbfd" stroke="#dbe6ef"/>
  <rect x="573" y="146" width="94" height="32" rx="8" fill="#ffffff" stroke="#dbe6ef"/>
  <text x="586" y="167" class="label" fill="#314253">Formatted</text>
  <text x="689" y="167" class="label">Markdown source</text>

  <text x="579" y="235" class="doc-title">Untitled Product Requirements Brief</text>
  <g>
    <rect x="579" y="258" width="657" height="92" rx="8" fill="#f8fafc" stroke="#e5ecf3"/>
    <rect x="579" y="258" width="4" height="92" rx="2" fill="#c9d6e2"/>
    <text x="598" y="287" class="section-title">Product Summary</text>
    <text x="598" y="317" class="pending">Pending conversation.</text>
  </g>
  <g>
    <rect x="579" y="364" width="657" height="92" rx="8" fill="#f8fafc" stroke="#e5ecf3"/>
    <rect x="579" y="364" width="4" height="92" rx="2" fill="#c9d6e2"/>
    <text x="598" y="393" class="section-title">Target Segment</text>
    <text x="598" y="423" class="pending">Pending conversation.</text>
  </g>
  <g>
    <rect x="579" y="470" width="657" height="92" rx="8" fill="#f8fafc" stroke="#e5ecf3"/>
    <rect x="579" y="470" width="4" height="92" rx="2" fill="#c9d6e2"/>
    <text x="598" y="499" class="section-title">Problem and Urgency</text>
    <text x="598" y="529" class="pending">Pending conversation.</text>
  </g>
  <g>
    <rect x="579" y="576" width="657" height="92" rx="8" fill="#f8fafc" stroke="#e5ecf3"/>
    <rect x="579" y="576" width="4" height="92" rx="2" fill="#c9d6e2"/>
    <text x="598" y="605" class="section-title">Competitive Landscape</text>
    <text x="598" y="635" class="pending">Pending conversation.</text>
  </g>
</svg>
